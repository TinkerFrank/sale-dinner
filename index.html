<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game of Life</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Conway's Game of Life</h1>
      <p class="subtitle">Click or drag to draw · Space to play/pause</p>
    </header>

    <main>
      <div class="canvas-wrap">
        <canvas id="grid" aria-label="Game of Life grid"></canvas>
      </div>

      <aside class="controls">
        <div class="stat-row">
          <span class="stat-label">Generation</span>
          <span id="generation" class="stat-value">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Live cells</span>
          <span id="population" class="stat-value">0</span>
        </div>

        <div class="btn-group">
          <button id="btn-play" class="btn btn-primary" title="Play / Pause (Space)">
            <span class="icon" id="play-icon">▶</span> <span id="play-label">Play</span>
          </button>
          <button id="btn-step" class="btn" title="Advance one generation">Step</button>
          <button id="btn-clear" class="btn" title="Clear the grid">Clear</button>
        </div>

        <div class="btn-group">
          <button id="btn-random" class="btn">Random</button>
          <button id="btn-glider" class="btn">Glider</button>
          <button id="btn-pulsar" class="btn">Pulsar</button>
        </div>

        <label class="control-label">
          Speed
          <input type="range" id="speed" min="1" max="60" value="15">
          <span id="speed-label">15 fps</span>
        </label>

        <label class="control-label">
          Grid size
          <select id="grid-size">
            <option value="40">40 × 40</option>
            <option value="60" selected>60 × 60</option>
            <option value="80">80 × 80</option>
            <option value="100">100 × 100</option>
            <option value="800x500">800 × 500</option>
          </select>
        </label>
      </aside>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
